[platformio]
default_envs = esp32doit-devkit-v1

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; Libraries
lib_deps =
    ArduinoJson @ ^6.21.0

; Serial & Upload
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DARDUINO_LOG_LEVEL=4

; Source
src_dir = firmware/boot/src

; Build directory
build_dir = .pio/build/${this.env}
